<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="initial-scale=1.0" />
  <title>WeddWish | Edit Profile</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <script type="module" src="js/edit-profile.js" defer></script>
  <script type="module" src="js/pages.js" defer></script>
  <script src="js/nav.js" defer></script>
  <script type="module" src="js/searchUsers.js" defer></script>
</head>

<body>
  <!-- نفس nav بتاعت باقي الصفحات (انسخها من user-profile.html لو حابب) -->

  <section class="profile-page">
    <div class="profile-header" style="align-items:flex-start;">
      <div class="profile-info">
        <h1>Edit Profile</h1>
        <span class="info-label">PROFILE IMAGE</span>

        <div class="info-card">
          <div class="icon-circle"><i class="fa fa-user"></i></div>
          <div class="info-text">
            <span class="info-title">Username</span>
            <span class="info-value" id="editUsername">Loading...</span>
          </div>
        </div>

        <div class="info-card">
          <div class="icon-circle"><i class="fa fa-envelope"></i></div>
          <div class="info-text">
            <span class="info-title">Email</span>
            <span class="info-value" id="editEmail">Loading...</span>
          </div>
        </div>
      </div>

      <div class="profile-avatar">
        <img id="editAvatarPreview" src="images/default-avatar.png" alt="Profile" />
      </div>
    </div>

    <div class="profile-actions" style="gap:10px;">
      <input id="editAvatarFile" type="file" accept="image/*" />
      <button id="saveAvatarBtn" class="submit-button" type="button">Save</button>
      <button id="cancelEditBtn" class="submit-button" type="button">Cancel</button>
      <span id="editStatus" style="color:white;opacity:.85;"></span>
    </div>
  </section>
</body>
</html>
