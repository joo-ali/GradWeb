<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Item to Wishlist</title>
</head>
<body>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>WiddWish | Contact</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">

    <!-- Optional theme -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap-theme.min.css" integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ" crossorigin="anonymous">

</head>
<body>
     <!-- ----------------------------------------NAVBAR----------------------------------------------------->
    
    <!-- ----------------------------------------ADDITEM----------------------------------------------------->
<body class="auth-body">
  <nav class="nav nav_top">
    <div class="logo">
      <a href="index.html">
        <img src="images/logo.png" width="250" alt="WeddWish" />
      </a>
    </div>
  </nav><nav class="nav nav_top">
        <div class="logo">
            <a href="index.html"><img src="images/logo.png" width="250"></a>
        </div>
        <div id="mySidenav" class="sidenav">
            <a href="index.html">HOME</a>
			<a href="user-profile.html">MY PROFILE</a>
            <a href="contact.html">CONTACT</a>
			<a href="about.html">ABOUT US</a>
        </div>
		
		<span onclick="toggleNav()"style="position: fixed; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: white; z-index: 2;">&#9776;</span>

		<!-- JavaScript -->
		<script>
		  function toggleNav() {
			const sidenav = document.getElementById("mySidenav");
			const menuBtn = document.getElementById("menuBtn");

			if (sidenav.style.width === "250px") {
			  // Close nav
			  sidenav.style.width = "0";
			  menuBtn.innerHTML = "&#9776;"; // ☰
			} else {
			  // Open nav
			  sidenav.style.width = "250px";
			  menuBtn.innerHTML = "&times;"; // ✖
			}
		  }
		</script>
    </nav>

  <div class="auth-container">
    <section class="auth-card">
      <div class="auth-top">
        <div class="auth-badge">Add item</div>
        <h1>Add a new gift</h1>
        <p>Describe the item you would like to receive.</p>
      </div>

      <form class="auth-form" id="addItemForm">
        <div class="field">
          <label>Item name</label>
          <div class="input">
            <span class="icon">🎁</span>
            <input type="text" id="itemName" required placeholder="e.g. Dinner set" />
          </div>
        </div>

        <div class="field">
          <label>Target amount</label>
          <div class="input">
            <span class="icon">💰</span>
            <input type="number" id="itemGoal" required min="1" placeholder="e.g. 1000" />
          </div>
          <small>Enter your goal in EGP or your main currency.</small>
        </div>

        <div class="field">
          <label>Description</label>
          <div class="input" style="align-items:flex-start;">
            <span class="icon">📝</span>
            <textarea id="itemDescription" required placeholder="Why this gift matters to you"
                      style="width:100%; border:none; outline:none; font-size:14px; min-height:100px;"></textarea>
          </div>
        </div>

        <div class="field">
        <label>Item image</label>

        <div class="image-upload-box">
            <label for="product-image" class="image-upload-label">
            <span class="upload-icon">⬆️</span>
            <span>Click to upload an image</span>
            </label>
            <input type="file" id="product-image" accept="image/*" />
        </div>
        </div>


        <button type="submit" class="primary">Add to wishlist</button>

        <div id="addItemMsg" class="msg" aria-live="polite"></div>
      </form>
    </section>

    <aside class="auth-side">
      <div class="side-card">
        <h2>Make it personal</h2>
        <p>Adding item helps friends gift you.</p>
        <div class="chips">
          <span class="chip">Photos</span>
          <span class="chip">Stories</span>
          <span class="chip">Goals</span>
        </div>
      </div>
    </aside>
  </div>

  <script>
    const addItemForm = document.getElementById("addItemForm");
    const addItemMsg = document.getElementById("addItemMsg");

    addItemForm.addEventListener("submit", (e) => {
      e.preventDefault();
      addItemMsg.textContent = "Item added to your wishlist (demo only, no backend call yet).";
      addItemMsg.style.color = "green";
      // here you can later send data to your backend with fetch()
    });
  </script>
</body>
</html>
