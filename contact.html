<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>WiddWish | Contact</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">

    <!-- Optional theme -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap-theme.min.css" integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ" crossorigin="anonymous">

</head>
<body>
     <!-- ----------------------------------------NAVBAR----------------------------------------------------->
<body class="auth-body">
  <nav class="nav nav_top">
    <div class="logo">
      <a href="index.html"><img src="images/logo.png" width="250" /></a>
    </div>
    <div id="mySidenav" class="sidenav">
      <a href="index.html">HOME</a>
      <a href="user-profile.html">MY PROFILE</a>
      <a href="contact.html">CONTACT</a>
      <a href="about.html">ABOUT US</a>
    </div>

    		<span onclick="toggleNav()"style="position: fixed; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: white; z-index: 2;">&#9776;</span>

		<!-- JavaScript -->
		<script>
		  function toggleNav() {
			const sidenav = document.getElementById("mySidenav");
			const menuBtn = document.getElementById("menuBtn");

			if (sidenav.style.width === "250px") {
			  // Close nav
			  sidenav.style.width = "0";
			  menuBtn.innerHTML = "&#9776;"; // ☰
			} else {
			  // Open nav
			  sidenav.style.width = "250px";
			  menuBtn.innerHTML = "&times;"; // ✖
			}
		  }
		</script>
  </nav>

  <div class="auth-container">
    <section class="auth-card">
      <div class="auth-top">
        <div class="auth-badge">Contact us</div>
        <h1>We are here to help</h1>
        <p>Send your question and we will respond as soon as possible.</p>
      </div>

      <form class="auth-form" id="contactForm">
        <div class="field">
          <label>Your name</label>
          <div class="input">
            <span class="icon">👤</span>
            <input type="text" id="contactName" required placeholder="Your name" />
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <div class="input">
            <span class="icon">✉️</span>
            <input type="email" id="contactEmail" required placeholder="you@example.com" />
          </div>
        </div>

        <div class="field">
          <label>Message</label>
          <div class="input" style="align-items:flex-start;">
            <span class="icon">💬</span>
            <textarea id="contactMessage" required placeholder="Write your message"
                      style="width:100%; border:none; outline:none; font-size:14px; min-height:120px;"></textarea>
          </div>
        </div>

        <button type="submit" class="primary">Send message</button>

        <div id="contactMsg" class="msg" aria-live="polite"></div>
      </form>
    </section>

    <aside class="auth-side">
      <div class="side-card">
        <h2>Need assistance?</h2>
        <p>Questions about wishlists, donations, or your account? Just reach out.</p>
        <div class="chips">
          <span class="chip">Support</span>
          <span class="chip">Feedback</span>
          <span class="chip">Partnerships</span>
        </div>
      </div>
    </aside>
  </div>

  <script>
    const contactForm = document.getElementById("contactForm");
    const contactMsg = document.getElementById("contactMsg");

    contactForm.addEventListener("submit", (e) => {
      e.preventDefault();
      contactMsg.textContent = "Thank you for contacting us. We will reply soon.";
      contactMsg.style.color = "green";
      contactForm.reset();
    });
  </script>
</body>
</html>
