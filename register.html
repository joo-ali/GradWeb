<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <link rel="stylesheet" href="style.css" />
  <!-- separate JS file -->
  <script type="module" src="js/register.js" defer></script>
</head>
<body class="auth-body">
  <!-- NAVBAR -->
  <nav class="nav nav_top">
    <div class="logo">
      <a href="index.html">
        <img src="images/logo.png" width="250" alt="WeddWish" />
      </a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-top">
        <div class="auth-badge">Create Account</div>
        <h1>Welcome 👋</h1>
        <p>Fill your details to get started.</p>
      </div>

      <form id="registerForm" class="auth-form" novalidate>
        <div class="grid-2">
          <div class="field">
            <label>Username</label>
            <div class="input">
              <span class="icon">👤</span>
              <input
                id="username"
                type="text"
                placeholder="user000"
                minlength="3"
                required
              />
            </div>
            <small>At least 3 characters</small>
          </div>

          <div class="field">
            <label>Email</label>
            <div class="input">
              <span class="icon">✉️</span>
              <input
                id="email"
                type="email"
                placeholder="you@example.com"
                required
              />
            </div>
          </div>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="input">
            <span class="icon">🔒</span>
            <input
              id="password"
              type="password"
              placeholder="Minimum 6 characters"
              minlength="6"
              required
            />
            <button type="button" class="ghost" id="togglePass">Show</button>
          </div>
          <small>Use a strong password</small>
        </div>

        <div class="grid-2">
          <div class="field">
            <label>Instapay Number</label>
            <div class="input">
              <span class="icon">💳</span>
              <input
                id="instapay"
                type="text"
                placeholder="e.g. 01234567890"
                required
              />
            </div>
          </div>

          <div class="field">
            <label>Address</label>
            <div class="input">
              <span class="icon">📍</span>
              <input
                id="address"
                type="text"
                placeholder="Your address"
                required
              />
            </div>
          </div>
        </div>

        <button id="submitBtn" class="primary" type="submit">
          <span class="btn-text">Create account</span>
          <span class="spinner" aria-hidden="true" style="display:none;"></span>
        </button>

        <div id="msg" class="msg" aria-live="polite"></div>


        <!-- OR divider -->
        <div style="display:flex; align-items:center; gap:10px; margin:18px 0;">
          <div style="flex:1; height:1px; background:rgba(255, 255, 255, 0.15);"></div>
          <span style="font-size:12px; text-transform:uppercase; color:rgba(255, 255, 255, 0.6);">
            or continue with
          </span>
          <div style="flex:1; height:1px; background:rgba(255, 255, 255, 0.15);"></div>
        </div>

        <!-- Social buttons -->
        <div style="display:flex; gap:10px; margin-bottom:10px;">
          <button
            type="button"
            id="googleRegister"
            class="primary"
            style="background:#fff; color:#222; border:1px solid rgba(255, 255, 255, 0.15); display:flex; align-items:center; justify-content:center; gap:8px;"
          >
              <img
                src="images/google.png"
                alt="Google"
                style="width:20px; height:20px; border-radius:50%; object-fit:cover;"
              />
            <span>Register with Google</span>
          </button>

          <button
            type="button"
            id="facebookRegister"
            class="primary"
            style="background:#1877f2; color:#fff; display:flex; align-items:center; justify-content:center; gap:8px;"
          >
            <img
                src="images/facebook.png"
                alt="facebook"
                style="width:20px; height:20px; border-radius:50%; object-fit:cover;"
              />
            <span>Register with Facebook</span>
          </button>
        </div>
        
        
    <div class="bottom">
          <span>Already have an account?</span>
          <a href="login.html">Sign in</a>
        </div>
      </form>
    </div>

    <div class="auth-side">
      <div class="side-card">
        <h2>A better way to give.</h2>
        <p>Contribute together. Celebrate together.</p>
        <div class="chips">
          <span class="chip">Wishlist</span>
          <span class="chip">Any Amount</span>
          <span class="chip">Real-Time Updates</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
